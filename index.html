<script>
const BADGE_MAP = {'焼肉':'b-red','ラーメン':'b-orange','タイ料理':'b-green','寿司':'b-blue','カレー':'b-yellow','中華':'b-orange','イタリアン':'b-green','その他':'b-gray'};
const RANK = ['★','★★','★★★'];
const AV_COLORS = [['rgba(120,53,15,.55)','#fbbf24'],['rgba(29,78,216,.4)','#93c5fd'],['rgba(20,83,45,.45)','#86efac'],['rgba(127,29,29,.4)','#fca5a5'],['rgba(88,28,135,.4)','#d8b4fe'],['rgba(6,78,59,.45)','#6ee7b7']];
const DOW_JP = ['日','月','火','水','木','金','土'];
const MON_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MH = {
  join:    ['受注完了！腹を空かして来い！','一飯の義！共に戦おうぞ！','ハンターが一名加わった！'],
  cancel:  ['受注をキャンセルした...また挑め！','撤退じゃ！次のクエストを探せ！'],
  like:    ['グッジョブ！飯への情熱が伝わってきた！','激励を受け取った！'],
  post:    ['依頼書をボードに貼り付けた！','新たなクエストが発令された！'],
  confirm: ['クエストを確定した！これより出発じゃ！','メンバー確定！一飯行こうぜ！'],
  delete:  ['クエストを取り消した。また発令せよ！'],
  full:    ['このクエストは定員に達している...'],
  dup:     ['本日すでに別クエストを受注済みだ！一日一飯の掟じゃ！'],
  liked:   ['すでにグッジョブ済みじゃ！'],
  expired: ['このクエストはすでに時刻を過ぎておる...'],
  pastdt:  ['過去の日時は選べぬ！'],
};
const rnd = a => a[Math.floor(Math.random()*a.length)];
const ME = 'あなた';

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function isExpired(q){ const t=todayStr(); if(q.date<t)return true; if(q.date>t)return false; const[h,m]=q.meetingTime.split(':').map(Number); return nowMin()>=h*60+m; }
function computeStatus(q){ if(q.status==='confirmed')return 'confirmed'; if(isExpired(q))return 'expired'; if(q.currentParticipants>=q.maxParticipants)return 'full'; return 'open'; }
function isClosed(q){ const s=computeStatus(q); return s!=='open'; }

function fmtDate(s){ const[y,m,d]=s.split('-'); return `${y}/${m}/${d}`; }
function fmtDateJp(s){ const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}月${d.getDate()}日（${DOW_JP[d.getDay()]}）`; }
function dateInfo(s){ const d=new Date(s+'T00:00:00'); return { day:d.getDate(), mon:MON_EN[d.getMonth()], dow:DOW_JP[d.getDay()], year:d.getFullYear() }; }

const TODAY = todayStr();
function dPlus(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

let quests = [
  { id:'q1', shopName:'焼肉ホルモン 炎の番人',  foodCategory:'焼肉',     maxParticipants:4, currentParticipants:2, meetingTime:'12:00', date:TODAY,    status:'open', likeCount:5,  postedBy:'田中', hunters:['田中','鈴木'] },
  { id:'q2', shopName:'ラーメン道場 鬼辛',       foodCategory:'ラーメン',  maxParticipants:3, currentParticipants:3, meetingTime:'12:15', date:TODAY,    status:'open', likeCount:12, postedBy:'佐藤', hunters:['佐藤','山田','高橋'] },
  { id:'q3', shopName:'タイ料理 バンコク食堂',   foodCategory:'タイ料理',  maxParticipants:5, currentParticipants:1, meetingTime:'13:00', date:TODAY,    status:'open', likeCount:3,  postedBy:ME,     hunters:[ME] },
  { id:'q4', shopName:'寿司割烹 海神',           foodCategory:'寿司',     maxParticipants:4, currentParticipants:2, meetingTime:'11:45', date:TODAY,    status:'open', likeCount:8,  postedBy:'伊藤', hunters:['伊藤','渡辺'] },
  { id:'q5', shopName:'スパイス魔境',            foodCategory:'カレー',   maxParticipants:4, currentParticipants:2, meetingTime:'12:30', date:dPlus(1), status:'open', likeCount:7,  postedBy:ME,     hunters:[ME,'加藤'] },
  { id:'q6', shopName:'麻婆豆腐 四川食堂',       foodCategory:'中華',     maxParticipants:5, currentParticipants:1, meetingTime:'12:00', date:dPlus(1), status:'open', likeCount:2,  postedBy:'松本', hunters:['松本'] },
  { id:'q7', shopName:'トラットリア ボスコ',     foodCategory:'イタリアン',maxParticipants:6, currentParticipants:2, meetingTime:'12:15', date:dPlus(2), status:'open', likeCount:4,  postedBy:'中村', hunters:['中村','小林'] },
];

let joinedQuestId = null;
const likedSet = new Set();
let selectedDate = TODAY;

setInterval(() => { render(); renderSidebar(); }, 30000);

function getRank(c,m){ const r=c/m; return r<0.4?0:r<0.8?1:2; }

/* ── Sidebar ── */
function renderSidebar(){
  const dates = [...new Set(quests.map(q=>q.date))].sort();
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  dates.forEach((date, i) => {
    const isToday = date===TODAY;
    const cnt = quests.filter(q=>q.date===date).length;
    const sel = date===selectedDate;
    const info = dateInfo(date);
    const el = document.createElement('div');
    el.className = 'sidebar-date-btn';
    el.innerHTML = `
      <div class="date-pill${isToday?' today-pill-wrap':''}${sel?' selected':''}" onclick="selectDate('${date}')">
        <div class="dp-dow">${info.dow}曜日</div>
        <div class="dp-day">${info.day}</div>
        <div class="dp-mon">${info.mon}</div>
        ${isToday?'<div class="today-tag">TODAY</div>':''}
        <div class="dp-count">${cnt}件</div>
      </div>
      ${i<dates.length-1?'<div class="connector-line"></div>':''}
    `;
    sb.appendChild(el);
  });
}

/* ── Quest column ── */
function renderQuestCol(){
  const col = document.getElementById('questCol');
  const filtered = quests.filter(q=>q.date===selectedDate)
    .sort((a,b)=>a.meetingTime<b.meetingTime?-1:a.meetingTime>b.meetingTime?1:0);

  const openQs   = filtered.filter(q=>!isClosed(q));
  const closedQs = filtered.filter(q=>isClosed(q));

  const isToday = selectedDate===TODAY;
  const info = dateInfo(selectedDate);
  const total = filtered.length;

  let html = `<div class="col-header">
    <div>
      <div class="col-date-title">${fmtDateJp(selectedDate)}</div>
      <div class="col-date-sub">${isToday?'本日のクエスト':'このクエストを確認中'}</div>
    </div>
    <div class="col-badge">${total}件のクエスト</div>
  </div>`;

  if(total===0){
    html += `<div class="empty-state"><div class="empty-icon">🛡</div><div class="empty-text">この日はクエストがない...</div></div>`;
  } else {
    if(openQs.length){
      html += `<div class="sub-label open">受注可能 (${openQs.length})</div>`;
      html += `<div class="grid section-gap">${openQs.map(renderCard).join('')}</div>`;
    }
    if(closedQs.length){
      html += `<div class="sub-label closed">受注不可 (${closedQs.length})</div>`;
      html += `<div class="grid">${closedQs.map(renderCard).join('')}</div>`;
    }
  }
  col.innerHTML = html;
}

function renderCard(q){
  const st     = computeStatus(q);
  const isMine = q.postedBy===ME;
  const isJoin = q.hunters.includes(ME)&&!isMine;
  const elsewhr= joinedQuestId!==null&&joinedQuestId!==q.id;
  const pct    = Math.min(q.currentParticipants/q.maxParticipants*100,100);
  const badge  = BADGE_MAP[q.foodCategory]||'b-gray';
  const rank   = RANK[getRank(q.currentParticipants,q.maxParticipants)];
  const liked  = likedSet.has(q.id);

  let cc = 'card ';
  if(st==='confirmed')   cc+='c-confirmed';
  else if(st==='expired')cc+='c-closed';
  else if(isMine)        cc+='c-mine';
  else                   cc+='c-open';

  const hdrCls = st==='confirmed'?'card-hdr hdr-confirmed':'card-hdr';
  const pfCls  = st==='confirmed'?'pf-green':st==='expired'?'pf-gray':st==='full'?'pf-red':'pf-amber';

  let hdrTag='';
  if(st==='expired')   hdrTag='<span class="tag-expired">⏰ 時間切れ</span>';
  if(st==='confirmed') hdrTag='<span class="tag-confirmed">✓ 確定</span>';

  let sbadge='';
  if(isMine&&st!=='confirmed'&&st!=='expired') sbadge='<span class="sb sb-owner">発令者</span>';
  else if(st==='confirmed') sbadge='<span class="sb sb-confirmed">確定済</span>';
  else if(st!=='open') sbadge='<span class="sb sb-closed">受注不可</span>';

  let acts='';
  if(isMine){
    if(st==='expired'){
      acts=`<button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕ 取消</button>`;
    } else if(st==='confirmed'){
      acts=`<button class="btn btn-off" style="flex:1" disabled>確定済み</button><button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕</button>`;
    } else {
      acts=`<button class="btn btn-confirm" onclick="confirmQuest('${q.id}')">✓ 確定</button><button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕ 取消</button>`;
    }
  } else if(st!=='open'&&!isJoin){
    acts=`<button class="btn btn-off" style="flex:1" disabled>受注不可</button>`;
  } else if(isJoin){
    acts=`<button class="btn btn-cancel" onclick="cancelQuest('${q.id}')">↩ キャンセル</button>`;
  } else if(elsewhr){
    acts=`<button class="btn btn-off" style="flex:1" disabled>受注不可</button>`;
  } else {
    acts=`<button class="btn btn-join" onclick="joinQuest('${q.id}')">⚔ 受注する</button>`;
  }

  return `<div class="${cc}" id="card-${q.id}">
    <div class="${hdrCls}">
      <div class="chdr-l">🔥 Lunch Quest</div>
      <div class="chdr-r">${hdrTag}<span class="rank">${rank}</span></div>
    </div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <div class="shop-name">${q.shopName}</div>
          <span class="cat-badge ${badge}">${q.foodCategory}</span>
        </div>
        ${sbadge}
      </div>
      <div class="card-date-row">📅 <span>${fmtDate(q.date)}</span>&nbsp;🕐&nbsp;<span>${q.meetingTime}</span>&nbsp;👥&nbsp;<span>${q.currentParticipants}/${q.maxParticipants}名</span>
      </div>
      <div class="prog-track"><div class="prog-fill ${pfCls}" style="width:${pct}%"></div></div>
      <div class="actions">
        ${acts}
        <button class="btn-sub" onclick="openDetail('${q.id}')">🔍</button>
        <button class="btn-like${liked?' liked':''}" onclick="likeQuest('${q.id}')" ${liked?'disabled':''}>👍 <span id="like-${q.id}">${q.likeCount}</span></button>
      </div>
    </div>
  </div>`;
}

function render(){
  if(joinedQuestId){ const jq=quests.find(q=>q.id===joinedQuestId); if(jq&&isExpired(jq))joinedQuestId=null; }
  renderQuestCol();
}

function selectDate(date){
  selectedDate = date;
  renderSidebar();
  renderQuestCol();
}

/* ── Actions ── */
function joinQuest(id){
  if(joinedQuestId&&joinedQuestId!==id){toast(rnd(MH.dup),'te');return;}
  const idx=quests.findIndex(q=>q.id===id); if(idx<0)return;
  const q=quests[idx];
  if(isExpired(q)){toast(rnd(MH.expired),'te');return;}
  if(q.currentParticipants>=q.maxParticipants){toast(rnd(MH.full),'te');return;}
  quests[idx]={...q,currentParticipants:q.currentParticipants+1,hunters:[...q.hunters,ME]};
  joinedQuestId=id; render(); toast(rnd(MH.join),'ts');
}
function cancelQuest(id){
  const idx=quests.findIndex(q=>q.id===id); if(idx<0)return;
  const q=quests[idx];
  quests[idx]={...q,currentParticipants:Math.max(0,q.currentParticipants-1),hunters:q.hunters.filter(h=>h!==ME)};
  if(joinedQuestId===id)joinedQuestId=null;
  render(); toast(rnd(MH.cancel),'ti');
}
function confirmQuest(id){
  const idx=quests.findIndex(q=>q.id===id); if(idx<0)return;
  quests[idx]={...quests[idx],status:'confirmed'};
  render(); toast(rnd(MH.confirm),'tg');
}
function deleteQuest(id){
  quests=quests.filter(q=>q.id!==id);
  if(joinedQuestId===id)joinedQuestId=null;
  // もし選択日にクエストが0件になったら別の日に移動
  const remaining=quests.filter(q=>q.date===selectedDate);
  if(remaining.length===0){
    const dates=[...new Set(quests.map(q=>q.date))].sort();
    selectedDate=dates.length>0?dates[0]:TODAY;
  }
  renderSidebar(); render(); toast(rnd(MH.delete),'te');
}
function likeQuest(id){
  if(likedSet.has(id)){toast(rnd(MH.liked),'te');return;}
  const idx=quests.findIndex(q=>q.id===id); if(idx<0)return;
  quests[idx]={...quests[idx],likeCount:quests[idx].likeCount+1};
  likedSet.add(id);
  const el=document.getElementById('like-'+id);
  if(el){el.textContent=quests[idx].likeCount; const b=el.closest('.btn-like'); if(b){b.classList.add('liked');b.disabled=true;}}
  toast(rnd(MH.like),'ti');
}

/* ── Detail ── */
function openDetail(id){
  const q=quests.find(q=>q.id===id); if(!q)return;
  const st=computeStatus(q);
  const pct=Math.min(q.currentParticipants/q.maxParticipants*100,100);
  const pfCls=st==='confirmed'?'pf-green':st==='full'?'pf-red':'pf-amber';
  const stColor=st==='open'?'#4ade80':st==='confirmed'?'#86efac':'#f87171';
  const stLabel=st==='open'?'受注可':st==='confirmed'?'確定済':'受注不可';
  const badge=BADGE_MAP[q.foodCategory]||'b-gray';
  const hunters=q.hunters.length===0
    ?'<div class="h-empty">まだ誰も受注していない...</div>'
    :q.hunters.map((h,i)=>{
      const[bg,fg]=AV_COLORS[i%AV_COLORS.length];
      const isYou=h===ME,isOwn=h===q.postedBy;
      return `<div class="h-row"><div class="h-av" style="background:${bg};color:${fg};">${h.charAt(0)}</div><span class="h-name">${h}</span>${isOwn?'<span class="h-tag ht-own">発令者</span>':''}${isYou&&!isOwn?'<span class="h-tag ht-you">あなた</span>':''}</div>`;
    }).join('');
  document.getElementById('detailMount').innerHTML=`<div class="overlay" id="dtBD" onclick="if(event.target.id==='dtBD')closeDetail()">
    <div class="panel">
      <div class="panel-hdr"><span class="panel-ttl">📜 クエスト詳細</span><button class="panel-close" onclick="closeDetail()">✕</button></div>
      <div class="panel-body">
        <div class="d-shop">${q.shopName}</div>
        <span class="cat-badge ${badge}" style="display:inline-block;margin-bottom:12px;">${q.foodCategory}</span>
        <div class="d-grid">
          <div class="d-item"><div class="d-lbl">📅 日付</div><div class="d-val">${fmtDate(q.date)}</div></div>
          <div class="d-item"><div class="d-lbl">🕐 集合時間</div><div class="d-val">${q.meetingTime}</div></div>
          <div class="d-item"><div class="d-lbl">👤 発令者</div><div class="d-val">${q.postedBy}</div></div>
          <div class="d-item"><div class="d-lbl">🏷 ステータス</div><div class="d-val" style="color:${stColor}">${stLabel}</div></div>
        </div>
        <div class="prog-row2"><span>参加状況</span><span>${q.currentParticipants} / ${q.maxParticipants}</span></div>
        <div class="prog-track" style="margin-bottom:12px;"><div class="prog-fill ${pfCls}" style="width:${pct}%"></div></div>
        <div class="h-ttl">⚔ 受注ハンター</div>
        <div class="h-list">${hunters}</div>
        <button class="close-btn" onclick="closeDetail()">閉じる</button>
      </div>
    </div>
  </div>`;
}
function closeDetail(){ document.getElementById('detailMount').innerHTML=''; }

/* ── Post Modal ── */
function openModal(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()+1).padStart(2,'0');
  document.getElementById('modalMount').innerHTML=`<div class="overlay" id="postBD" onclick="if(event.target.id==='postBD')closeModal()">
    <div class="modal-form">
      <div class="mf-hdr"><span class="mf-ttl">📜 新規クエスト依頼書</span><button class="panel-close" onclick="closeModal()">✕</button></div>
      <div class="mf-body">
        <div><div class="f-lbl">🗺 お店の名前</div><input class="f-inp" id="f-shop" type="text" placeholder="例：焼肉ホルモン 炎の番人" /></div>
        <div><div class="f-lbl">🍴 食べたいもの</div>
          <select class="f-inp" id="f-cat"><option>焼肉</option><option>ラーメン</option><option>タイ料理</option><option>寿司</option><option>カレー</option><option>中華</option><option>イタリアン</option><option>その他</option></select>
        </div>
        <div class="f-row">
          <div><div class="f-lbl">👥 最大人数</div><input class="f-inp" id="f-max" type="number" min="2" max="10" value="4" /></div>
          <div><div class="f-lbl">🕐 集合時間</div><input class="f-inp" id="f-time" type="time" value="12:00" /></div>
        </div>
        <div><div class="f-lbl">📅 日付</div><input class="f-inp" id="f-date" type="date" value="${TODAY}" min="${TODAY}" onchange="onDateChange()" /></div>
        <div><div class="f-lbl">👤 あなたの名前</div><input class="f-inp" id="f-name" type="text" placeholder="名前（省略で「あなた」）" /></div>
        <p class="f-note">※ デモ用。実装時はログインユーザーを使用</p>
        <button class="f-submit" onclick="postQuest()">── クエストを発令する ──</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{ const e=document.getElementById('f-shop'); if(e)e.focus(); },40);
}
function closeModal(){ document.getElementById('modalMount').innerHTML=''; }

function onDateChange(){
  const de=document.getElementById('f-date');
  const te=document.getElementById('f-time');
  if(!de||!te)return;
  if(de.value===TODAY){
    const n=new Date();
    const h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()+1).padStart(2,'0');
    te.min=`${h}:${m}`;
    const[ch,cm]=te.value.split(':').map(Number);
    if(ch*60+cm<n.getHours()*60+n.getMinutes()+1) te.value=`${h}:${m}`;
  } else { te.min='00:00'; }
}

function postQuest(){
  const shop=(document.getElementById('f-shop').value||'').trim();
  if(!shop){document.getElementById('f-shop').focus();return;}
  const cat =document.getElementById('f-cat').value;
  const max =parseInt(document.getElementById('f-max').value)||4;
  const time=document.getElementById('f-time').value||'12:00';
  const date=document.getElementById('f-date').value||TODAY;
  const name=(document.getElementById('f-name').value||'').trim();
  const poster=name||ME;
  if(date<TODAY||(date===TODAY&&(()=>{ const[h,m]=time.split(':').map(Number); return h*60+m<nowMin(); })())){
    toast(rnd(MH.pastdt),'te'); return;
  }
  quests.push({id:'q'+Date.now(),shopName:shop,foodCategory:cat,maxParticipants:max,currentParticipants:1,meetingTime:time,date,status:'open',likeCount:0,postedBy:poster,hunters:[poster]});
  selectedDate=date;
  closeModal(); renderSidebar(); render(); toast(rnd(MH.post),'ts');
}

/* ── Toast ── */
function toast(msg,cls='ts'){
  const w=document.getElementById('toastWrap');
  const e=document.createElement('div');
  e.className='toast '+cls;
  const icons={ts:'⚔',te:'🛡',ti:'👍',tg:'✓'};
  e.innerHTML=`<span>${icons[cls]||'⚔'}</span><span>${msg}</span>`;
  w.appendChild(e);
  setTimeout(()=>{e.style.transition='opacity .3s';e.style.opacity='0';setTimeout(()=>e.remove(),300);},3200);
}

renderSidebar();
render();
</script>
