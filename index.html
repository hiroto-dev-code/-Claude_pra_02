
<style>

  /* Quest column */

  .sub-section-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 0 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sub-section-label::after { content: ''; flex: 1; height: 1px; }
  .sub-label-open  { color: #d97706; }
  .sub-label-open::after  { background: rgba(120,53,15,0.3); }
  .sub-label-closed{ color: #3f3f46; }
  .sub-label-closed::after{ background: #27272a; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 12px; margin-bottom: 16px; }

  .card { border-radius: 3px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .card.open-card   { border: 1px solid rgba(120,53,15,0.45); background: linear-gradient(135deg,#18181b,#18181b,rgba(120,53,15,0.07)); }
  .card.open-card:hover { border-color: rgba(217,119,6,0.65); box-shadow: 0 4px 20px rgba(120,53,15,0.18); }

  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 13px; border-bottom: 1px solid rgba(120,53,15,0.22); background: rgba(120,53,15,0.1); }

  .card-body { padding: 12px 13px; }

  .badge-blue   { color:#60a5fa;border-color:#1d4ed8;background:rgba(29,78,216,0.2); }

  .badge-gray   { color:#a1a1aa;border-color:#52525b;background:rgba(39,39,42,0.5); }

  .status-badge { font-size:10px;font-weight:700;padding:3px 7px;border-radius:2px;border:1px solid;flex-shrink:0;font-family:var(--font-mono,monospace); }
  .sb-closed    { color:#f87171;border-color:#991b1b;background:rgba(127,29,29,0.3);transform:rotate(1deg); }

  .progress-track { height:3px;background:#27272a;border-radius:99px;overflow:hidden;margin-bottom:10px; }
  .progress-fill  { height:100%;border-radius:99px;transition:width 0.5s; }
  .progress-fill.amber { background:#f59e0b; }
  .progress-fill.red   { background:#dc2626; }

  .card-actions { display:flex;gap:6px; }
  .btn { display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 9px;font-size:11px;font-weight:700;border-radius:2px;cursor:pointer;font-family:var(--font-mono,monospace);transition:background 0.15s,transform 0.1s;letter-spacing:0.02em;border:1px solid;white-space:nowrap; }

  .detail-shop { font-size:17px;font-weight:700;color:#f4f4f5;font-family:sans-serif;margin-bottom:5px; }
  .detail-grid { display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0; }
  .ditem { background:#18181b;border:1px solid #27272a;border-radius:3px;padding:9px 11px; }

  /* Modal */
  .modal { width:100%;max-width:420px;border:1px solid rgba(180,83,9,0.6);background:#09090b;border-radius:3px; }

  .modal-body { padding:17px;display:flex;flex-direction:column;gap:12px; }

  .field input,.field select { width:100%;padding:7px 10px;background:#18181b;border:1px solid #3f3f46;border-radius:2px;color:#e4e4e7;font-size:12px;font-family:var(--font-mono,monospace);outline:none;transition:border-color 0.15s; }
  .field input:focus,.field select:focus { border-color:#d97706; }

  @keyframes slideIn { from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);} }
</style>

<script>
const BADGE = {'焼肉':'badge-red','ラーメン':'badge-orange','タイ料理':'badge-green','寿司':'badge-blue','カレー':'badge-yellow','中華':'badge-orange','イタリアン':'badge-green','その他':'badge-gray'};
const RANK  = ['★','★★','★★★'];
const AV_COLORS = [
  ['rgba(120,53,15,0.55)','#fbbf24'],['rgba(29,78,216,0.4)','#93c5fd'],
  ['rgba(20,83,45,0.45)','#86efac'],['rgba(127,29,29,0.4)','#fca5a5'],
  ['rgba(88,28,135,0.4)','#d8b4fe'],['rgba(6,78,59,0.45)','#6ee7b7'],
];
const MH = {
  join:    ['受注完了！腹を空かして来い！','一飯の義！共に戦おうぞ！','ハンターが一名加わった！'],
  cancel:  ['受注をキャンセルした...また挑め！','撤退じゃ！次のクエストを探せ！'],
  like:    ['グッジョブ！飯への情熱が伝わってきた！','激励を受け取った！','ナイスサポート！'],
  post:    ['依頼書をボードに貼り付けた！','新たなクエストが発令された！'],
  confirm: ['クエストを確定した！これより出発じゃ！','メンバー確定！一飯行こうぜ！'],
  delete:  ['クエストを取り消した。また発令せよ！'],
  full:    ['このクエストは定員に達している...'],
  dup:     ['本日すでに別クエストを受注済みだ！一日一飯の掟じゃ！'],
  liked:   ['すでにグッジョブ済みじゃ！'],
  expired: ['このクエストはすでに時刻を過ぎておる...'],
  pastdt:  ['過去の日時は選べぬ！'],
};
const rnd = a => a[Math.floor(Math.random()*a.length)];

const ME = 'あなた';
const DAY_JP = ['日','月','火','水','木','金','土'];
const MONTH_JP = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function nowMinutes(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function isExpired(q){
  const t=todayStr();
  if(q.date<t) return true;
  if(q.date>t) return false;
  const [h,m]=q.meetingTime.split(':').map(Number);
  return nowMinutes() >= h*60+m;
}
function computeStatus(q){
  if(q.status==='confirmed') return 'confirmed';
  if(isExpired(q)) return 'expired';
  if(q.currentParticipants>=q.maxParticipants) return 'full';
  return 'open';
}
function isClosed(q){ const s=computeStatus(q); return s==='confirmed'||s==='expired'||s==='full'; }
function fmtDate(s){ const [y,m,d]=s.split('-'); return `${y}/${m}/${d}`; }
function parseDateObj(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dateLabel(s){
  const d=parseDateObj(s);
  return { day: d.getDate(), month: MONTH_JP[d.getMonth()], dow: DAY_JP[d.getDay()], year: d.getFullYear() };
}

const TODAY = todayStr();

// サンプルデータ（明日・明後日も追加して日付順を確認）
function tomorrow(){ const d=new Date(); d.setDate(d.getDate()+1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayAfter(){ const d=new Date(); d.setDate(d.getDate()+2); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

let quests = [
  { id:'q1', shopName:'焼肉ホルモン 炎の番人',  foodCategory:'焼肉',    maxParticipants:4, currentParticipants:2, meetingTime:'12:00', date:TODAY,    status:'open', likeCount:5,  postedBy:'田中', hunters:['田中','鈴木'] },
  { id:'q2', shopName:'ラーメン道場 鬼辛',       foodCategory:'ラーメン', maxParticipants:3, currentParticipants:3, meetingTime:'12:15', date:TODAY,    status:'open', likeCount:12, postedBy:'佐藤', hunters:['佐藤','山田','高橋'] },
  { id:'q3', shopName:'タイ料理 バンコク食堂',   foodCategory:'タイ料理', maxParticipants:5, currentParticipants:1, meetingTime:'13:00', date:TODAY,    status:'open', likeCount:3,  postedBy:ME,     hunters:[ME] },
  { id:'q4', shopName:'寿司割烹 海神',           foodCategory:'寿司',    maxParticipants:4, currentParticipants:2, meetingTime:'11:45', date:TODAY,    status:'open', likeCount:8,  postedBy:'伊藤', hunters:['伊藤','渡辺'] },
  { id:'q5', shopName:'スパイス魔境',            foodCategory:'カレー',  maxParticipants:4, currentParticipants:2, meetingTime:'12:30', date:tomorrow(),status:'open', likeCount:7,  postedBy:ME,     hunters:[ME,'加藤'] },
  { id:'q6', shopName:'麻婆豆腐 四川食堂',       foodCategory:'中華',    maxParticipants:5, currentParticipants:1, meetingTime:'12:00', date:tomorrow(),status:'open', likeCount:2,  postedBy:'松本', hunters:['松本'] },
  { id:'q7', shopName:'トラットリア ボスコ',     foodCategory:'イタリアン',maxParticipants:6,currentParticipants:2, meetingTime:'12:15', date:dayAfter(),status:'open', likeCount:4,  postedBy:'中村', hunters:['中村','小林'] },
];

let joinedQuestId = null;
const likedSet = new Set();
setInterval(render, 30000);

function getRank(c,m){ const r=c/m; return r<0.4?0:r<0.8?1:2; }

function renderCard(q){
  const st      = computeStatus(q);
  const isMine  = q.postedBy===ME;
  const isJoined= q.hunters.includes(ME) && !isMine;
  const alreadyJoinedElsewhere = joinedQuestId!==null && joinedQuestId!==q.id;
  const pct     = Math.min(q.currentParticipants/q.maxParticipants*100,100);
  const badge   = BADGE[q.foodCategory]||'badge-gray';
  const rank    = RANK[getRank(q.currentParticipants,q.maxParticipants)];
  const isLiked = likedSet.has(q.id);

  let cardClass = 'card ';
  if(st==='confirmed')      cardClass+='confirmed-card';
  else if(st==='expired')   cardClass+='closed-card';
  else if(isMine)           cardClass+='my-card';
  else                      cardClass+='open-card';

  const hdrClass = st==='confirmed' ? 'card-header confirmed-hdr' : 'card-header';
  const progressColor = st==='confirmed'?'green':st==='expired'?'gray':st==='full'?'red':'amber';

  // ヘッダー右タグ
  let hdrTag = '';
  if(st==='expired')   hdrTag = '<span class="expired-tag">⏰ 時間切れ</span>';
  if(st==='confirmed') hdrTag = '<span class="confirmed-tag">✓ 確定</span>';

  // ステータスバッジ
  let sbadge = '';
  if(isMine && st!=='confirmed' && st!=='expired') sbadge = '<span class="status-badge sb-owner">発令者</span>';
  else if(st==='confirmed') sbadge = '<span class="status-badge sb-confirmed">確定済</span>';
  else if(st!=='open') sbadge = '<span class="status-badge sb-closed">受注不可</span>';

  // アクションボタン群
  let actions = '';
  if(isMine){
    if(st==='expired'){
      actions = `<button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕ 取消</button>`;
    } else if(st==='confirmed'){
      actions = `<button class="btn btn-disabled" style="flex:1" disabled>確定済み</button>
                 <button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕</button>`;
    } else {
      actions = `<button class="btn btn-confirm" onclick="confirmQuest('${q.id}')">✓ 確定</button>
                 <button class="btn btn-delete" onclick="deleteQuest('${q.id}')">✕ 取消</button>`;
    }
  } else if(st==='expired'||st==='confirmed'){
    actions = `<button class="btn btn-disabled" style="flex:1" disabled>受注不可</button>`;
  } else if(st==='full' && !isJoined){
    actions = `<button class="btn btn-disabled" style="flex:1" disabled>受注不可</button>`;
  } else if(isJoined){
    actions = `<button class="btn btn-cancel" onclick="cancelQuest('${q.id}')">↩ キャンセル</button>`;
  } else if(alreadyJoinedElsewhere){
    actions = `<button class="btn btn-disabled" style="flex:1" disabled>受注不可</button>`;
  } else {
    actions = `<button class="btn btn-join" onclick="joinQuest('${q.id}')">⚔ 受注する</button>`;
  }

  return `<div class="${cardClass}" id="card-${q.id}">
    <div class="${hdrClass}">
      <div class="card-header-left">🔥 Lunch Quest</div>
      <div class="card-header-right">${hdrTag}<span class="rank">${rank}</span></div>
    </div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <div class="shop-name">${q.shopName}</div>
          <span class="category-badge ${badge}">${q.foodCategory}</span>
        </div>
        ${sbadge}
      </div>
      <div class="stats">
        <div class="stat">🕐 <span class="stat-val">${q.meetingTime}</span></div>
        <div class="stat">👥 <span class="stat-val${st==='full'?' red':''}">${q.currentParticipants}</span><span class="stat-muted"> / ${q.maxParticipants}</span></div>
      </div>
      <div class="progress-track"><div class="progress-fill ${progressColor}" style="width:${pct}%"></div></div>
      <div class="card-actions">
        ${actions}
        <button class="btn-detail" onclick="openDetail('${q.id}')">🔍</button>
        <button class="btn-like${isLiked?' liked':''}" onclick="likeQuest('${q.id}')" ${isLiked?'disabled':''}>
          👍 <span id="like-${q.id}">${q.likeCount}</span>
        </button>
      </div>
    </div>
  </div>`;
}

function render(){
  if(joinedQuestId){
    const jq=quests.find(q=>q.id===joinedQuestId);
    if(jq && isExpired(jq)) joinedQuestId=null;
  }

  // 日付でソート
  const sorted = [...quests].sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:
    (a.meetingTime<b.meetingTime?-1:a.meetingTime>b.meetingTime?1:0));

  // 日付ごとにグループ化
  const byDate = {};
  sorted.forEach(q=>{ if(!byDate[q.date]) byDate[q.date]=[]; byDate[q.date].push(q); });

  let html = '<div class="date-sidebar" id="sidebar"></div><div class="quest-column" id="qcol"></div>';
  document.getElementById('main').innerHTML = html;

  const sidebar = document.getElementById('sidebar');
  const qcol    = document.getElementById('qcol');

  const dates = Object.keys(byDate).sort();
  dates.forEach((date, di) => {
    const qs = byDate[date];
    const openQs   = qs.filter(q=>!isClosed(q));
    const closedQs = qs.filter(q=>isClosed(q));
    const isToday  = date===TODAY;
    const isPast   = date<TODAY;
    const lblInfo  = dateLabel(date);
    const badgeCls = isToday?'today':isPast?'past':'future';

    // sidebar date badge
    const sEl = document.createElement('div');
    sEl.className = 'date-label-wrap';
    sEl.style.cssText = `margin-bottom:0;`;
    // estimate height: each section ~(cards*180+48)px, rough sync
    sEl.innerHTML = `<div class="date-label">
      <div class="date-badge ${badgeCls}">
        <div class="date-day-name">${lblInfo.dow}曜日</div>
        <div class="date-day-num">${lblInfo.day}</div>
        <div class="date-month">${lblInfo.month} ${lblInfo.year}</div>
        ${isToday?'<div class="today-pill">TODAY</div>':''}
      </div>
      ${di<dates.length-1?'<div class="date-connector"></div>':''}
    </div>`;
    sidebar.appendChild(sEl);

    // quest section
    const qEl = document.createElement('div');
    qEl.className = 'date-section';
    let inner = '<div class="date-section-inner">';
    if(openQs.length){
      inner += `<div class="sub-section-label sub-label-open">受注可能 (${openQs.length})</div>`;
      inner += `<div class="grid">${openQs.map(renderCard).join('')}</div>`;
    }
    if(closedQs.length){
      inner += `<div class="sub-section-label sub-label-closed">受注不可 (${closedQs.length})</div>`;
      inner += `<div class="grid">${closedQs.map(renderCard).join('')}</div>`;
    }
    inner += '</div>';
    qEl.innerHTML = inner;
    qcol.appendChild(qEl);
  });
}

function toast(msg,type='success'){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast '+type;
  const icons={success:'⚔',error:'🛡',info:'👍',green:'✓'};
  el.innerHTML=`<span>${icons[type]||'⚔'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity 0.3s';el.style.opacity='0';setTimeout(()=>el.remove(),300);},3200);
}

function joinQuest(id){
  if(joinedQuestId&&joinedQuestId!==id){toast(rnd(MH.dup),'error');return;}
  const idx=quests.findIndex(q=>q.id===id); if(idx===-1)return;
  const q=quests[idx];
  if(isExpired(q)){toast(rnd(MH.expired),'error');return;}
  if(q.currentParticipants>=q.maxParticipants){toast(rnd(MH.full),'error');return;}
  quests[idx]={...q,currentParticipants:q.currentParticipants+1,hunters:[...q.hunters,ME]};
  joinedQuestId=id; render(); toast(rnd(MH.join),'success');
}
function cancelQuest(id){
  const idx=quests.findIndex(q=>q.id===id); if(idx===-1)return;
  const q=quests[idx];
  quests[idx]={...q,currentParticipants:Math.max(0,q.currentParticipants-1),hunters:q.hunters.filter(h=>h!==ME)};
  if(joinedQuestId===id) joinedQuestId=null;
  render(); toast(rnd(MH.cancel),'info');
}
function confirmQuest(id){
  const idx=quests.findIndex(q=>q.id===id); if(idx===-1)return;
  quests[idx]={...quests[idx],status:'confirmed'};
  render(); toast(rnd(MH.confirm),'green');
}
function deleteQuest(id){
  quests=quests.filter(q=>q.id!==id);
  if(joinedQuestId===id) joinedQuestId=null;
  render(); toast(rnd(MH.delete),'error');
}
function likeQuest(id){
  if(likedSet.has(id)){toast(rnd(MH.liked),'error');return;}
  const idx=quests.findIndex(q=>q.id===id); if(idx===-1)return;
  quests[idx]={...quests[idx],likeCount:quests[idx].likeCount+1};
  likedSet.add(id);
  const el=document.getElementById('like-'+id);
  if(el){ el.textContent=quests[idx].likeCount; const btn=el.closest('.btn-like'); if(btn){btn.classList.add('liked');btn.disabled=true;} }
  toast(rnd(MH.like),'info');
}

/* ---- Detail ---- */
function openDetail(id){
  const q=quests.find(q=>q.id===id); if(!q)return;
  const st=computeStatus(q);
  const badge=BADGE[q.foodCategory]||'badge-gray';
  const pct=Math.min(q.currentParticipants/q.maxParticipants*100,100);
  const stColor=st==='open'?'#4ade80':st==='confirmed'?'#86efac':'#f87171';
  const stLabel=st==='open'?'受注可':st==='confirmed'?'確定済':'受注不可';
  const huntersHtml=q.hunters.length===0
    ?'<div class="empty-hunters">まだ誰も受注していない...</div>'
    :q.hunters.map((h,i)=>{
      const [bg,fg]=AV_COLORS[i%AV_COLORS.length];
      const isYou=h===ME, isOwner=h===q.postedBy;
      return `<div class="hunter-row">
        <div class="hunter-av" style="background:${bg};color:${fg};">${h.charAt(0)}</div>
        <span class="hunter-name">${h}</span>
        ${isOwner?'<span class="hunter-tag tag-owner">発令者</span>':''}
        ${isYou&&!isOwner?'<span class="hunter-tag tag-you">あなた</span>':''}
      </div>`;
    }).join('');
  document.getElementById('detailMount').innerHTML=`<div class="overlay" id="dtBD" onclick="closeDTBD(event)">
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title">📜 クエスト詳細</span><button class="panel-close" onclick="closeDetail()">✕</button></div>
      <div class="panel-body">
        <div class="detail-shop">${q.shopName}</div>
        <span class="category-badge ${badge}" style="display:inline-block;margin-bottom:14px;">${q.foodCategory}</span>
        <div class="detail-grid">
          <div class="ditem"><div class="ditem-label">📅 日付</div><div class="ditem-val">${fmtDate(q.date)}</div></div>
          <div class="ditem"><div class="ditem-label">🕐 集合時間</div><div class="ditem-val">${q.meetingTime}</div></div>
          <div class="ditem"><div class="ditem-label">👤 発令者</div><div class="ditem-val">${q.postedBy}</div></div>
          <div class="ditem"><div class="ditem-label">🏷 ステータス</div><div class="ditem-val" style="color:${stColor}">${stLabel}</div></div>
        </div>
        <div class="prog-row"><span>参加状況</span><span>${q.currentParticipants} / ${q.maxParticipants}</span></div>
        <div class="progress-track" style="margin-bottom:14px;"><div class="progress-fill ${st==='confirmed'?'green':st==='full'?'red':'amber'}" style="width:${pct}%"></div></div>
        <div class="hunters-title">⚔ 受注ハンター</div>
        <div class="hunters-list">${huntersHtml}</div>
        <button class="submit-btn" style="background:rgba(39,39,42,0.45);border-color:#3f3f46;color:#a1a1aa;" onclick="closeDetail()">閉じる</button>
      </div>
    </div>
  </div>`;
}
function closeDetail(){ document.getElementById('detailMount').innerHTML=''; }
function closeDTBD(e){ if(e.target.id==='dtBD') closeDetail(); }

/* ---- Post Modal ---- */
function openModal(){
  // 現在時刻の次の分を minTime として算出
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()+1).padStart(2,'0');
  const minTime=`${hh}:${mm}`;

  document.getElementById('modalMount').innerHTML=`<div class="overlay" id="postBD" onclick="closeModalBD(event)">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-title">📜 新規クエスト依頼書</span><button class="panel-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>🗺 お店の名前</label><input id="f-shop" type="text" placeholder="例：焼肉ホルモン 炎の番人" /></div>
        <div class="field"><label>🍴 食べたいもの</label>
          <select id="f-cat"><option>焼肉</option><option>ラーメン</option><option>タイ料理</option><option>寿司</option><option>カレー</option><option>中華</option><option>イタリアン</option><option>その他</option></select>
        </div>
        <div class="field-row">
          <div class="field"><label>👥 最大人数</label><input id="f-max" type="number" min="2" max="10" value="4" /></div>
          <div class="field"><label>🕐 集合時間</label><input id="f-time" type="time" value="12:00" min="${minTime}" /></div>
        </div>
        <div class="field"><label>📅 日付</label><input id="f-date" type="date" value="${TODAY}" min="${TODAY}" onchange="validateDateTime()" /></div>
        <div class="field"><label>👤 あなたの名前</label><input id="f-name" type="text" placeholder="名前（省略で「あなた」）" /></div>
        <p class="field-note">※ デモ用。実装時はログインユーザーを使用します</p>
        <button class="submit-btn" onclick="postQuest()">── クエストを発令する ──</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{ const el=document.getElementById('f-shop'); if(el)el.focus(); },50);
}
function closeModal(){ document.getElementById('modalMount').innerHTML=''; }
function closeModalBD(e){ if(e.target.id==='postBD') closeModal(); }

function validateDateTime(){
  const dateEl=document.getElementById('f-date');
  const timeEl=document.getElementById('f-time');
  if(!dateEl||!timeEl) return;
  const selDate=dateEl.value;
  if(selDate===TODAY){
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0');
    const mm=String(now.getMinutes()+1).padStart(2,'0');
    timeEl.min=`${hh}:${mm}`;
    // 現在時刻より前なら補正
    const [h,m]=timeEl.value.split(':').map(Number);
    if(h*60+m < now.getHours()*60+now.getMinutes()+1){
      timeEl.value=`${hh}:${mm}`;
    }
  } else {
    timeEl.min='00:00';
  }
}

function postQuest(){
  const shop=document.getElementById('f-shop').value.trim();
  if(!shop){document.getElementById('f-shop').focus();return;}
  const cat  = document.getElementById('f-cat').value;
  const max  = parseInt(document.getElementById('f-max').value)||4;
  const time = document.getElementById('f-time').value||'12:00';
  const date = document.getElementById('f-date').value||TODAY;
  const nameVal = (document.getElementById('f-name').value||'').trim();
  const poster = nameVal||ME;

  // 過去日時チェック
  if(date<TODAY||(date===TODAY&&(()=>{ const [h,m]=time.split(':').map(Number); return h*60+m<nowMinutes(); })())){
    toast(rnd(MH.pastdt),'error'); return;
  }

  const newQ={id:'q'+Date.now(),shopName:shop,foodCategory:cat,maxParticipants:max,
    currentParticipants:1,meetingTime:time,date:date,status:'open',likeCount:0,
    postedBy:poster,hunters:[poster]};
  quests.push(newQ);
  closeModal(); render(); toast(rnd(MH.post),'success');
}

render();
</script>
